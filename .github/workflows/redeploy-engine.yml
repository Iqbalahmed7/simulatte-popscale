name: Redeploy Simulatte Engine

# Automatically trigger a Railway redeploy of simulatte-engine
# whenever code is pushed to main. The engine installs this package
# via pip from GitHub, so a redeploy picks up the latest commit.

on:
  push:
    branches: [main]

jobs:
  redeploy:
    name: Trigger Railway engine redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway engine redeploy via API
        run: |
          curl -fsSL -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation{serviceInstanceRedeploy(serviceId:\"1c0269f8-b2d8-464e-9372-d78586fff930\",environmentId:\"11c001b9-0724-485f-b6c9-24f6c6f108fd\")}"}'
          echo "Railway redeploy triggered for simulatte-engine"
